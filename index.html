<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Snake</title>
    <link rel="shortcut icon" href="myfavicon.ico" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css?family=Bungee+Shade|Press+Start+2P|Audiowide"
      rel="stylesheet"
    />
    <link rel="stylesheet" type="text/css" href="./snake.css" />
    <script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
  </head>
  <body align="center">
    <!-- Linha principal: jogo à esquerda, scoreboard à direita -->
    <div class="main-row">
      <!-- Coluna esquerda: container do jogo + bg-selector -->
      <div class="game-col">
        <div class="big-container">
          <div id="container">
            <div id="status-bar"></div>
            <canvas id="game-canvas" width="780" height="500"></canvas>
            <menu id="controls"></menu>
            <info id="info">
              <instructions class="instructions">
                <h3>Instructions</h3>
                <strong>Eat the apples <img src="img/apple.png" height="16" width="16" /></strong
                ><br />
                <strong>Don't run into the wall or yourself!</strong><br />
              </instructions>
              <keys class="keys">
                <h3>Keys</h3>
                <strong
                  >Use <code>&#65514;</code> <code>&#65516;</code> <code>&#65515;</code>
                  <code>&#65513;</code> or <code>w</code> <code>s</code> <code>a</code>
                  <code>d</code> to move</strong
                ><br />
                <strong><code>esc</code> to go back to the start menu</strong>
              </keys>
              <div class="other-game">
                Want to play another game? Try
                <a href="https://haleymt.github.io/CrystalQuest" target="_blank">Crystal Quest</a>.
              </div>
            </info>
          </div>
        </div>

        <!-- Seletor de backgrounds -->
        <div id="bg-selector">
          <span class="bg-label">Background:</span>
          <button class="bg-btn active" data-theme="classic">Classico</button>
          <button class="bg-btn" data-theme="neon">Neon City</button>
          <button class="bg-btn" data-theme="forest">Floresta</button>
          <button class="bg-btn" data-theme="space">Espaco</button>
          <button class="bg-btn" data-theme="desert">Deserto</button>
          <button class="bg-btn" data-theme="retro">Retro</button>
        </div>
      </div>

      <!-- Coluna direita: scoreboard -->
      <div class="score-col">
        <div id="scoreboard"></div>
      </div>
    </div>

    <script src="lib/audio.js"></script>
    <script src="lib/backgrounds.js"></script>
    <script src="lib/scores.js"></script>
    <script src="lib/game.js"></script>
    <script src="lib/level.js"></script>
    <script src="lib/snake.js"></script>
    <script src="lib/apple.js"></script>
    <script>
      var canvas = document.getElementById('game-canvas');
      var ctx = canvas.getContext('2d');
      var audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      document.querySelectorAll('.bg-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          SnakeGame.Backgrounds.setTheme(btn.dataset.theme);
        });
      });

      SnakeGame.Backgrounds.draw(ctx, 780, 500, 10);
      SnakeGame.Scores.render();
      new SnakeGame.Game(780, 500, ctx, audioCtx).run();
    </script>
  </body>
</html>
